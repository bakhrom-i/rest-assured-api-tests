name: REST Assured API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run TestNG suite
        run: mvn -B clean test -Denv=dev
        continue-on-error: true

      - name: Prepare report for Pages
        if: always()
        run: |
          mkdir -p public
          if [ -d target/surefire-reports ]; then
            cp -r target/surefire-reports/* public/ 2>/dev/null || true
          fi
          if [ ! -f public/index.html ]; then
            cat > public/index.html <<'EOF'
          <!doctype html>
          <html><head><title>REST Assured API Tests</title>
          <style>body{font-family:sans-serif;max-width:680px;margin:60px auto;padding:0 20px;color:#222}
          h1{color:#FF6F00}code{background:#f4f4f4;padding:2px 6px;border-radius:4px}</style></head>
          <body><h1>REST Assured API Test Suite</h1>
          <p>The TestNG report will appear here once tests run successfully.</p>
          <p>Framework: REST Assured 5 + TestNG 7 + JSON Schema validation + data-driven via @DataProvider.</p>
          <p>See repository <a href="https://github.com/bakhrom-i/rest-assured-api-tests">on GitHub</a>.</p>
          </body></html>
          EOF
          fi

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  publish-report:
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
